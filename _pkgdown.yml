      These functions are called internally by the analysis functions.
      Most users should not call them directly.
    contents:
      - analyseOneElement.lm
      - analyseOneElement.gam
      - analyseOneElement.wrap

  - title: "Merging"
    contents:
      - mergeModelArrays

  - title: "Utilities"
    contents:
      - h5summary
      - numElementsTotal
      - gen_gamFormula_fxSmooth
      - gen_gamFormula_contIx

redirects:
  - ["articles/wrap.html", "articles/modelling.html"]
